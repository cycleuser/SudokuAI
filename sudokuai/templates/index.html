<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SudokuAI - LLM Sudoku Evaluation Platform</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #2196F3;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #F44336;
            --border: #e0e0e0;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #64B5F6;
            --success: #81C784;
            --warning: #FFB74D;
            --error: #E57373;
            --border: #404040;
        }
        
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: var(--text-secondary); margin-bottom: 20px; }
        
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .theme-toggle {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .theme-toggle:hover { background: var(--border); }
        
        .panel {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .panel h3 { margin: 0 0 12px 0; }
        
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        
        select, input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-secondary { background: #607D8B; color: white; }
        
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            max-width: 450px;
            margin: 16px auto;
            background: #333;
            padding: 2px;
            border-radius: 4px;
        }
        
        .sudoku-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            background: var(--bg-primary);
            color: var(--accent);
        }
        .sudoku-cell.fixed { background: var(--bg-secondary); color: var(--text-primary); }
        .sudoku-cell.valid-move { background: rgba(76, 175, 80, 0.3); animation: pulse 0.4s; }
        .sudoku-cell.invalid-move { background: rgba(244, 67, 54, 0.3); animation: shake 0.4s; }
        .sudoku-cell.conflict { background: rgba(255, 235, 59, 0.5); }
        
        @keyframes pulse { 50% { transform: scale(1.05); } }
        @keyframes shake {
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #666; }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .stat-box {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        
        .thought-container {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .thought-bubble {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .thought-bubble.thinking { background: #FFF8E1; border-color: #FFA000; }
        .thought-bubble.valid { background: #E8F5E9; border-color: #4CAF50; }
        .thought-bubble.invalid { background: #FFEBEE; border-color: #F44336; }
        .thought-bubble .header { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
        .thought-bubble .content { font-size: 12px; color: var(--text-secondary); }
        
        .log {
            background: #1e1e1e;
            color: #b0b0b0;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 160px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log-success { color: #81C784; }
        .log-error { color: #E57373; }
        .log-info { color: #64B5F6; }
        .log-warning { color: #FFB74D; }
        
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--text-secondary); }
        .form-group select, .form-group input { width: 100%; }
        
        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .header-bar { flex-direction: column; gap: 12px; }
        }
        
        .progress { 
            height: 3px; 
            background: var(--bg-secondary);
            border-radius: 2px;
            margin: 8px 0;
        }
        .progress-bar {
            height: 100%;
            background: var(--success);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-bar.indeterminate {
            width: 30%;
            animation: indeterminate 1s infinite linear;
        }
        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            z-index: 1000;
            animation: fadein 0.3s;
        }
        .toast.error { background: rgba(183, 28, 28, 0.95); }
        .toast.success { background: rgba(27, 94, 32, 0.95); }
        .toast.warning { background: rgba(230, 81, 0, 0.95); }
        @keyframes fadein { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div>
                <h1>🧩 SudokuAI</h1>
                <p class="subtitle">LLM-powered Sudoku Evaluation Platform v{{ version }}</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span> <span id="themeLabel">Dark Mode</span>
            </button>
        </div>
        
        <div class="panel">
            <h3>🎮 Game Controls</h3>
            <div class="controls">
                <label>Difficulty:
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                        <option value="master">Master</option>
                    </select>
                </label>
                <button class="btn-primary" onclick="generateGame()">🎲 New Game</button>
                <button class="btn-warning" onclick="solveGame()">💡 Solve</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>🧩 Sudoku Board</h3>
            <div class="progress" id="progress" style="display:none;">
                <div class="progress-bar indeterminate" id="progressBar"></div>
            </div>
            <div class="sudoku-grid" id="sudokuGrid"></div>
        </div>
        
        <div class="two-col">
            <div class="panel">
                <h3>🤖 LLM Configuration</h3>
                <div class="form-group">
                    <label>Provider:</label>
                    <select id="provider" onchange="refreshModels()">
                        <option value="ollama">Ollama (Local)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Model:</label>
                    <div style="display: flex; gap: 6px;">
                        <select id="model" style="flex: 1;">
                            <option value="">Loading...</option>
                        </select>
                        <button onclick="refreshModels()" style="padding: 6px 10px;">🔄</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mode:</label>
                    <select id="mode">
                        <option value="step">Step-by-step</option>
                        <option value="oneshot">One-shot</option>
                    </select>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="btn-success" onclick="llmPlay()">▶ Let LLM Play</button>
                    <button class="btn-primary" onclick="llmEvaluate()">📊 Evaluate</button>
                </div>
            </div>
            
            <div class="panel">
                <h3>📊 Statistics</h3>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-value" id="statAccuracy">--</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statMoves">--</div>
                        <div class="stat-label">Moves</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statTime">--</div>
                        <div class="stat-label">Time</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statDifficulty">--</div>
                        <div class="stat-label">Difficulty</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h3>💭 AI Thoughts</h3>
            <div class="thought-container" id="thoughtContainer"></div>
        </div>
        
        <div class="panel">
            <h3>📋 Activity Log</h3>
            <div class="log" id="log"></div>
        </div>
    </div>
    
    <script>
        let currentGame = null;
        let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
        
        if (isDarkTheme) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').textContent = '☀️';
            document.getElementById('themeLabel').textContent = 'Light Mode';
        }
        
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            localStorage.setItem('darkTheme', isDarkTheme);
            document.documentElement.setAttribute('data-theme', isDarkTheme ? 'dark' : 'light');
            document.getElementById('themeIcon').textContent = isDarkTheme ? '☀️' : '🌙';
            document.getElementById('themeLabel').textContent = isDarkTheme ? 'Light Mode' : 'Dark Mode';
        }
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<span class="log-${type}">[${time}] ${message}</span>\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showProgress(show) {
            document.getElementById('progress').style.display = show ? 'block' : 'none';
        }
        
        function updateProgress(percent) {
            const bar = document.getElementById('progressBar');
            bar.classList.remove('indeterminate');
            bar.style.width = percent + '%';
        }
        
        function addThoughtBubble(text, step, type = 'thinking', errorDetail = '') {
            const container = document.getElementById('thoughtContainer');
            const bubble = document.createElement('div');
            bubble.className = `thought-bubble ${type}`;
            let header = type === 'valid' ? '✅ Valid Move' : type === 'invalid' ? '❌ Invalid Move' : '🧠 Thinking...';
            bubble.innerHTML = `<div class="header">${header} (Step ${step})</div><div class="content">${text}${errorDetail ? `<br><br>⚠️ ${errorDetail}` : ''}</div>`;
            container.insertBefore(bubble, container.firstChild);
            while (container.children.length > 5) container.removeChild(container.lastChild);
        }
        
        function renderGrid(puzzle) {
            const grid = document.getElementById('sudokuGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 81; i++) {
                const row = Math.floor(i / 9);
                const col = i % 9;
                const value = puzzle[row][col];
                const cell = document.createElement('div');
                cell.className = 'sudoku-cell ' + (value ? 'fixed' : 'empty');
                cell.textContent = value || '';
                grid.appendChild(cell);
            }
        }
        
        async function refreshModels() {
            const provider = document.getElementById('provider').value;
            const modelSelect = document.getElementById('model');
            modelSelect.innerHTML = '<option value="">Loading...</option>';
            
            try {
                const response = await fetch(`/api/models?provider=${provider}`);
                const result = await response.json();
                
                if (result.success && result.data.models.length > 0) {
                    modelSelect.innerHTML = '';
                    result.data.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        modelSelect.appendChild(opt);
                    });
                    log(`Loaded ${result.data.models.length} models`, 'success');
                } else {
                    modelSelect.innerHTML = '<option value="">No models</option>';
                    log('No models found', 'warning');
                }
            } catch (e) {
                modelSelect.innerHTML = '<option value="">Error</option>';
                log(`Error: ${e.message}`, 'error');
            }
        }
        
        async function generateGame() {
            const difficulty = document.getElementById('difficulty').value;
            log(`Generating ${difficulty} puzzle...`);
            showProgress(true);
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({difficulty})
                });
                const result = await response.json();
                
                if (result.success) {
                    currentGame = result.data;
                    renderGrid(currentGame.puzzle);
                    document.getElementById('statDifficulty').textContent = difficulty;
                    document.getElementById('thoughtContainer').innerHTML = '';
                    log(`New ${difficulty} puzzle (${currentGame.clues} clues)`, 'success');
                    showToast('Puzzle generated!', 'success');
                } else {
                    log(`Error: ${result.error}`, 'error');
                }
            } catch (e) {
                log(`Failed: ${e.message}`, 'error');
            } finally {
                showProgress(false);
            }
        }
        
        async function solveGame() {
            if (!currentGame) { showToast('Generate a game first', 'warning'); return; }
            renderGrid(currentGame.solution);
            log('Solution revealed', 'success');
        }
        
        async function llmPlay() {
            if (!currentGame) { showToast('Generate a game first', 'warning'); return; }
            
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const mode = document.getElementById('mode').value;
            
            if (!model) { showToast('Select a model', 'warning'); return; }
            
            log(`Starting LLM play: ${model}...`);
            showProgress(true);
            addThoughtBubble('Connecting to LLM...', 0, 'thinking');
            
            try {
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({provider, model, mode, difficulty: currentGame.difficulty})
                });
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    if (data.final_board) renderGrid(data.final_board);
                    
                    document.getElementById('statAccuracy').textContent = data.correct ? '100%' : '0%';
                    document.getElementById('statMoves').textContent = data.total_moves;
                    document.getElementById('statTime').textContent = data.time_elapsed.toFixed(1) + 's';
                    
                    const accuracy = (data.valid_moves / data.total_moves * 100).toFixed(0);
                    addThoughtBubble(`Game ${data.correct ? 'completed!' : 'failed'}. Accuracy: ${accuracy}%`, data.total_moves, data.correct ? 'valid' : 'invalid');
                    
                    log(`${data.correct ? '✅ Solved!' : '❌ Failed'} (${data.valid_moves}/${data.total_moves} valid)`, data.correct ? 'success' : 'error');
                    showToast(data.correct ? 'Puzzle solved!' : `Failed (${accuracy}% accuracy)`, data.correct ? 'success' : 'error');
                } else {
                    log(`Error: ${result.error}`, 'error');
                    addThoughtBubble(result.error, 0, 'invalid');
                }
            } catch (e) {
                log(`Failed: ${e.message}`, 'error');
            } finally {
                showProgress(false);
            }
        }
        
        async function llmEvaluate() {
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const mode = document.getElementById('mode').value;
            
            if (!model) { showToast('Select a model', 'warning'); return; }
            
            log(`Evaluating ${model}...`);
            showProgress(true);
            
            try {
                const response = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({provider, model, mode, difficulties: ['easy', 'medium'], games_per_difficulty: 2})
                });
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('statAccuracy').textContent = (data.overall_accuracy * 100).toFixed(0) + '%';
                    document.getElementById('statMoves').textContent = data.total_games;
                    document.getElementById('statTime').textContent = data.total_time.toFixed(1) + 's';
                    
                    log(`Accuracy: ${(data.overall_accuracy * 100).toFixed(1)}%`, 'success');
                    showToast(`Accuracy: ${(data.overall_accuracy * 100).toFixed(0)}%`, 'success');
                } else {
                    log(`Error: ${result.error}`, 'error');
                }
            } catch (e) {
                log(`Failed: ${e.message}`, 'error');
            } finally {
                showProgress(false);
            }
        }
        
        renderGrid(Array(9).fill().map(() => Array(9).fill(0)));
        refreshModels();
        log('Ready. Generate a new game to begin.', 'info');
    </script>
</body>
</html>
