<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SudokuAI - LLM Sudoku Evaluation Platform</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #2196F3;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #F44336;
            --border: #e0e0e0;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #64B5F6;
            --success: #81C784;
            --warning: #FFB74D;
            --error: #E57373;
            --border: #404040;
        }
        
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { margin-bottom: 5px; font-size: 24px; }
        .subtitle { color: var(--text-secondary); margin-bottom: 15px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .theme-toggle {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .theme-toggle:hover { background: var(--border); }
        
        .panel {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .panel h3 { margin: 0 0 10px 0; font-size: 14px; }
        
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        select, input {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        button {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            max-width: 400px;
            margin: 12px auto;
            background: #333;
            padding: 2px;
            border-radius: 3px;
        }
        
        .sudoku-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: var(--bg-primary);
            color: var(--accent);
        }
        .sudoku-cell.fixed { background: var(--bg-secondary); color: var(--text-primary); }
        .sudoku-cell.valid-move { background: rgba(76, 175, 80, 0.3); }
        .sudoku-cell.invalid-move { background: rgba(244, 67, 54, 0.3); }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #555; }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-box {
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value { font-size: 18px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
        
        .thought-container {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .thought-bubble {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 12px;
        }
        .thought-bubble.thinking { background: #FFF8E1; border-color: #FFA000; }
        .thought-bubble.valid { background: #E8F5E9; border-color: #4CAF50; }
        .thought-bubble.invalid { background: #FFEBEE; border-color: #F44336; }
        .thought-bubble .header { font-weight: 600; margin-bottom: 2px; }
        .thought-bubble .content { font-size: 11px; color: var(--text-secondary); }
        
        .log {
            background: #1e1e1e;
            color: #b0b0b0;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log-success { color: #81C784; }
        .log-error { color: #E57373; }
        .log-info { color: #64B5F6; }
        
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 8px; }
        .form-group label { display: block; margin-bottom: 3px; font-size: 12px; color: var(--text-secondary); }
        .form-group select, .form-group input { width: 100%; }
        
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-ready { background: #C8E6C9; color: #2E7D32; }
        .status-nokey { background: #FFE0B2; color: #E65100; }
        
        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
        
        .progress { height: 3px; background: var(--bg-secondary); border-radius: 2px; margin: 6px 0; }
        .progress-bar { height: 100%; background: var(--success); border-radius: 2px; width: 0%; transition: width 0.3s; }
        .progress-bar.indeterminate { width: 30%; animation: indeterminate 1s infinite linear; }
        @keyframes indeterminate { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
        
        .toast {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            z-index: 1000;
        }
        .toast.error { background: rgba(183, 28, 28, 0.95); }
        .toast.success { background: rgba(27, 94, 32, 0.95); }
        .toast.warning { background: rgba(230, 81, 0, 0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div>
                <h1>SudokuAI</h1>
                <p class="subtitle">LLM Sudoku Evaluation Platform v{{ version }}</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">Dark</span>
            </button>
        </div>
        
        <div class="panel">
            <h3>Game Controls</h3>
            <div class="controls">
                <label>Difficulty:
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                        <option value="master">Master</option>
                    </select>
                </label>
                <button class="btn-primary" onclick="generateGame()">New Game</button>
                <button class="btn-warning" onclick="solveGame()">Solve</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>Sudoku Board</h3>
            <div class="progress" id="progress" style="display:none;">
                <div class="progress-bar indeterminate" id="progressBar"></div>
            </div>
            <div class="sudoku-grid" id="sudokuGrid"></div>
        </div>
        
        <div class="two-col">
            <div class="panel">
                <h3>LLM Configuration</h3>
                <div class="form-group">
                    <label>Provider:</label>
                    <select id="provider" onchange="onProviderChanged()">
                        <option value="ollama">Ollama (Local)</option>
                        <option value="openai">OpenAI</option>
                        <option value="aliyun">Aliyun (Qwen)</option>
                        <option value="minimax">Minimax</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="moonshot">Moonshot (Kimi)</option>
                        <option value="zhipu">Zhipu (GLM)</option>
                    </select>
                    <span id="providerStatus" class="status-badge status-ready">Ready</span>
                </div>
                <div class="form-group">
                    <label>API Key: <span id="keyStatus"></span></label>
                    <input type="password" id="apiKey" placeholder="Enter API key">
                </div>
                <div class="form-group">
                    <label>Model:</label>
                    <select id="model"></select>
                </div>
                <div class="form-group">
                    <label>Mode:</label>
                    <select id="mode">
                        <option value="step">Step-by-step</option>
                        <option value="oneshot">One-shot</option>
                    </select>
                </div>
                <div class="controls">
                    <button class="btn-success" onclick="llmPlay()">Play</button>
                    <button class="btn-primary" onclick="llmEvaluate()">Evaluate</button>
                </div>
            </div>
            
            <div class="panel">
                <h3>Statistics</h3>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-value" id="statAccuracy">--</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statMoves">--</div>
                        <div class="stat-label">Moves</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statTime">--</div>
                        <div class="stat-label">Time</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statDifficulty">--</div>
                        <div class="stat-label">Difficulty</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h3>AI Thoughts</h3>
            <div class="thought-container" id="thoughtContainer"></div>
        </div>
        
        <div class="panel">
            <h3>Activity Log</h3>
            <div class="log" id="log"></div>
        </div>
    </div>
    
    <script>
        const PROVIDER_MODELS = {
            ollama: [],
            openai: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo', 'o1-preview', 'o1-mini'],
            aliyun: ['qwen-turbo', 'qwen-plus', 'qwen-max', 'qwen2.5-72b-instruct', 'qwen2.5-32b-instruct', 'qwen2.5-14b-instruct', 'qwen2.5-7b-instruct'],
            minimax: ['abab6.5-chat', 'abab6.5s-chat', 'abab5.5-chat', 'abab5.5s-chat'],
            deepseek: ['deepseek-chat', 'deepseek-coder', 'deepseek-reasoner'],
            moonshot: ['moonshot-v1-8k', 'moonshot-v1-32k', 'moonshot-v1-128k'],
            zhipu: ['glm-4', 'glm-4-flash', 'glm-4-plus', 'glm-4-air', 'glm-4-airx']
        };
        
        const API_KEY_KEY = 'sudokuai_api_keys';
        let currentGame = null;
        let isDarkTheme = localStorage.getItem('darkTheme') === 'true';
        
        if (isDarkTheme) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').textContent = 'Light';
        }
        
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            localStorage.setItem('darkTheme', isDarkTheme);
            document.documentElement.setAttribute('data-theme', isDarkTheme ? 'dark' : 'light');
            document.getElementById('themeIcon').textContent = isDarkTheme ? 'Light' : 'Dark';
        }
        
        function getApiKeys() {
            try {
                return JSON.parse(localStorage.getItem(API_KEY_KEY) || '{}');
            } catch { return {}; }
        }
        
        function saveApiKey(provider, key) {
            const keys = getApiKeys();
            keys[provider] = key;
            localStorage.setItem(API_KEY_KEY, JSON.stringify(keys));
        }
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<span class="log-${type}">[${time}] ${message}</span>\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showProgress(show) {
            document.getElementById('progress').style.display = show ? 'block' : 'none';
        }
        
        function addThoughtBubble(text, step, type = 'thinking') {
            const container = document.getElementById('thoughtContainer');
            const bubble = document.createElement('div');
            bubble.className = `thought-bubble ${type}`;
            const header = type === 'valid' ? 'Valid Move' : type === 'invalid' ? 'Invalid Move' : 'Thinking...';
            bubble.innerHTML = `<div class="header">${header} (Step ${step})</div><div class="content">${text}</div>`;
            container.insertBefore(bubble, container.firstChild);
            while (container.children.length > 5) container.removeChild(container.lastChild);
        }
        
        function renderGrid(puzzle) {
            const grid = document.getElementById('sudokuGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 81; i++) {
                const row = Math.floor(i / 9);
                const col = i % 9;
                const value = puzzle[row][col];
                const cell = document.createElement('div');
                cell.className = 'sudoku-cell ' + (value ? 'fixed' : 'empty');
                cell.textContent = value || '';
                grid.appendChild(cell);
            }
        }
        
        function onProviderChanged() {
            const provider = document.getElementById('provider').value;
            const keys = getApiKeys();
            const hasKey = provider === 'ollama' || keys[provider];
            
            const status = document.getElementById('providerStatus');
            if (hasKey) {
                status.className = 'status-badge status-ready';
                status.textContent = 'Ready';
            } else {
                status.className = 'status-badge status-nokey';
                status.textContent = 'Need API Key';
            }
            
            if (keys[provider]) {
                document.getElementById('apiKey').value = keys[provider];
            } else {
                document.getElementById('apiKey').value = '';
            }
            
            const modelSelect = document.getElementById('model');
            modelSelect.innerHTML = '';
            const models = PROVIDER_MODELS[provider] || [];
            
            if (provider === 'ollama') {
                refreshOllamaModels();
            } else if (models.length > 0) {
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
            }
        }
        
        async function refreshOllamaModels() {
            const modelSelect = document.getElementById('model');
            modelSelect.innerHTML = '<option value="">Loading...</option>';
            
            try {
                const response = await fetch('/api/models?provider=ollama');
                const result = await response.json();
                
                if (result.success && result.data.models.length > 0) {
                    modelSelect.innerHTML = '';
                    result.data.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        modelSelect.appendChild(opt);
                    });
                } else {
                    modelSelect.innerHTML = '<option value="">No models</option>';
                }
            } catch (e) {
                modelSelect.innerHTML = '<option value="">Error</option>';
            }
        }
        
        async function generateGame() {
            const difficulty = document.getElementById('difficulty').value;
            log(`Generating ${difficulty} puzzle...`);
            showProgress(true);
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({difficulty})
                });
                const result = await response.json();
                
                if (result.success) {
                    currentGame = result.data;
                    renderGrid(currentGame.puzzle);
                    document.getElementById('statDifficulty').textContent = difficulty;
                    document.getElementById('thoughtContainer').innerHTML = '';
                    log(`New ${difficulty} puzzle (${currentGame.clues} clues)`, 'success');
                    showToast('Puzzle generated!', 'success');
                } else {
                    log(`Error: ${result.error}`, 'error');
                }
            } catch (e) {
                log(`Failed: ${e.message}`, 'error');
            } finally {
                showProgress(false);
            }
        }
        
        async function solveGame() {
            if (!currentGame) { showToast('Generate a game first', 'warning'); return; }
            renderGrid(currentGame.solution);
            log('Solution revealed', 'success');
        }
        
        async function llmPlay() {
            if (!currentGame) { showToast('Generate a game first', 'warning'); return; }
            
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const mode = document.getElementById('mode').value;
            const apiKey = document.getElementById('apiKey').value;
            
            if (provider !== 'ollama' && !apiKey) {
                showToast('Enter API key', 'warning');
                return;
            }
            
            if (!model) {
                showToast('Select a model', 'warning');
                return;
            }
            
            saveApiKey(provider, apiKey);
            
            log(`Playing with ${model}...`);
            showProgress(true);
            addThoughtBubble('Connecting to LLM...', 0, 'thinking');
            
            try {
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({provider, model, mode, difficulty: currentGame.difficulty, api_key: apiKey})
                });
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    if (data.final_board) renderGrid(data.final_board);
                    
                    document.getElementById('statAccuracy').textContent = data.correct ? '100%' : '0%';
                    document.getElementById('statMoves').textContent = data.total_moves;
                    document.getElementById('statTime').textContent = data.time_elapsed.toFixed(1) + 's';
                    
                    const accuracy = (data.valid_moves / data.total_moves * 100).toFixed(0);
                    addThoughtBubble(`${data.correct ? 'Solved!' : 'Failed'}. Accuracy: ${accuracy}%`, data.total_moves, data.correct ? 'valid' : 'invalid');
                    
                    log(`${data.correct ? 'Solved!' : 'Failed'} (${data.valid_moves}/${data.total_moves})`, data.correct ? 'success' : 'error');
                    showToast(data.correct ? 'Solved!' : `Failed (${accuracy}%)`, data.correct ? 'success' : 'error');
                } else {
                    log(`Error: ${result.error}`, 'error');
                    addThoughtBubble(result.error, 0, 'invalid');
                }
            } catch (e) {
                log(`Failed: ${e.message}`, 'error');
            } finally {
                showProgress(false);
            }
        }
        
        async function llmEvaluate() {
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const mode = document.getElementById('mode').value;
            const apiKey = document.getElementById('apiKey').value;
            
            if (provider !== 'ollama' && !apiKey) {
                showToast('Enter API key', 'warning');
                return;
            }
            
            if (!model) {
                showToast('Select a model', 'warning');
                return;
            }
            
            saveApiKey(provider, apiKey);
            
            log(`Evaluating ${model}...`);
            showProgress(true);
            
            try {
                const response = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({provider, model, mode, difficulties: ['easy', 'medium'], games_per_difficulty: 2, api_key: apiKey})
                });
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('statAccuracy').textContent = (data.overall_accuracy * 100).toFixed(0) + '%';
                    document.getElementById('statMoves').textContent = data.total_games;
                    document.getElementById('statTime').textContent = data.total_time.toFixed(1) + 's';
                    
                    log(`Accuracy: ${(data.overall_accuracy * 100).toFixed(1)}%`, 'success');
                    showToast(`Accuracy: ${(data.overall_accuracy * 100).toFixed(0)}%`, 'success');
                } else {
                    log(`Error: ${result.error}`, 'error');
                }
            } catch (e) {
                log(`Failed: ${e.message}`, 'error');
            } finally {
                showProgress(false);
            }
        }
        
        renderGrid(Array(9).fill().map(() => Array(9).fill(0)));
        onProviderChanged();
        log('Ready. Generate a game to begin.', 'info');
    </script>
</body>
</html>
